<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack Opening FC 24 – Joyeux Anniversaire Ali 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
/* ═══════════════════════════════════════════
   VARIABLES GLOBALES
═══════════════════════════════════════════ */
:root {
  --gold:        #D4AF37;
  --gold-light:  #F5D76E;
  --gold-dark:   #A08020;
  --black-deep:  #05050A;
  --black-card:  #0D0D1A;
  --white:       #FFFFFF;
  --card-bg:     linear-gradient(160deg, #1a1230 0%, #0d0820 40%, #1a1030 100%);
  --card-gold:   linear-gradient(135deg, #c9922a 0%, #f5d76e 35%, #d4af37 55%, #b8860b 100%);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--black-deep);
  font-family: 'Montserrat', sans-serif;
  cursor: none;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════════════ */
#cursor {
  width: 12px; height: 12px;
  background: var(--gold);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: transform .1s;
  box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(212,175,55,.4);
}
#cursor-trail {
  width: 30px; height: 30px;
  border: 1px solid rgba(212,175,55,.5);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%,-50%);
}

/* ═══════════════════════════════════════════
   CANVAS FX (light beams)
═══════════════════════════════════════════ */
#canvas-fx {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 20;
  opacity: 0;
}

/* ═══════════════════════════════════════════
   ARRIÈRE-PLAN VIDÉO (Phase 4)
═══════════════════════════════════════════ */
#video-wall {
  position: fixed; inset: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  z-index: 1;
  opacity: 0;
  pointer-events: none;
}
#video-wall iframe {
  width: 100%; height: 100%;
  border: none;
  pointer-events: none;
}
#video-overlay {
  position: fixed; inset: 0;
  background: rgba(5,5,10,.82);
  backdrop-filter: blur(4px) saturate(1.4);
  z-index: 2;
  opacity: 0;
}

/* ═══════════════════════════════════════════
   SCÈNE PRINCIPALE
═══════════════════════════════════════════ */
#scene {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
}

/* Particules de fond */
#bg-particles {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  overflow: hidden;
}
.bg-star {
  position: absolute; border-radius: 50%;
  background: rgba(212,175,55,.6);
  animation: twinkle linear infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0; transform: scale(.5); }
  50%      { opacity: 1; transform: scale(1); }
}

/* ═══════════════════════════════════════════
   PHASE 1 – LE PACK
═══════════════════════════════════════════ */
#phase-pack {
  display: flex; flex-direction: column;
  align-items: center; gap: 2.5rem;
  z-index: 15; position: relative;
}

.pack-wrapper {
  position: relative;
  animation: packFloat 3s ease-in-out infinite;
}
@keyframes packFloat {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50%     { transform: translateY(-18px) rotate(1deg); }
}

/* Le pack lui-même */
.pack {
  width: clamp(180px, 30vw, 240px);
  height: clamp(260px, 43vw, 350px);
  border-radius: 18px;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 60px rgba(212,175,55,.45),
    0 0 120px rgba(212,175,55,.2),
    inset 0 1px 0 rgba(255,255,255,.2);
  cursor: none;
}

.pack-bg {
  position: absolute; inset: 0;
  background: linear-gradient(150deg,
    #1a1010 0%, #0a0510 20%,
    #1e1505 40%, #120e00 60%,
    #0d0d1a 80%, #050510 100%);
}

/* Shimmer holographique */
.pack-sheen {
  position: absolute; inset: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(
    105deg,
    transparent 35%,
    rgba(212,175,55,.08) 45%,
    rgba(245,215,110,.18) 50%,
    rgba(212,175,55,.08) 55%,
    transparent 65%
  );
  animation: packSheen 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes packSheen {
  0%   { transform: translateX(-60%) translateY(-30%) rotate(15deg); }
  100% { transform: translateX(60%)  translateY(30%)  rotate(15deg); }
}

/* Bordure dorée */
.pack-border {
  position: absolute; inset: 6px;
  border-radius: 12px;
  border: 1.5px solid;
  border-image: linear-gradient(135deg,#f5d76e,#8a6510,#f5d76e,#8a6510) 1;
  pointer-events: none;
}

/* Contenu du pack */
.pack-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 20px 16px 24px;
}
.pack-logo-area {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  width: 100%;
}
.pack-ea-badge {
  font-family: 'Oswald', sans-serif;
  font-size: .55rem; font-weight: 700;
  letter-spacing: .25em; text-transform: uppercase;
  color: rgba(212,175,55,.7);
  border: 1px solid rgba(212,175,55,.3);
  padding: 2px 8px; border-radius: 2px;
}
.pack-title {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1rem, 4vw, 1.3rem);
  font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase;
  background: var(--card-gold);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  text-align: center; line-height: 1.1;
}
.pack-subtitle {
  font-size: .5rem; font-weight: 600;
  letter-spacing: .4em; text-transform: uppercase;
  color: rgba(255,255,255,.4);
}

/* Illustration centrale du pack */
.pack-center-art {
  flex: 1; display: flex; align-items: center;
  justify-content: center; width: 100%;
  position: relative;
}
.pack-shield {
  width: clamp(70px, 14vw, 95px);
  filter: drop-shadow(0 0 20px rgba(212,175,55,.5));
}
.pack-stars {
  display: flex; gap: 4px; margin-top: 4px;
}
.pack-star { color: var(--gold); font-size: .9rem; }

/* Étiquette "SPECIAL" */
.pack-special-tag {
  background: linear-gradient(135deg,#c9922a,#f5d76e);
  color: #000; font-size: .5rem; font-weight: 900;
  letter-spacing: .3em; padding: 3px 10px;
  border-radius: 2px; text-transform: uppercase;
}

/* Lignes décoratives */
.pack-deco-lines {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.pack-deco-lines::before, .pack-deco-lines::after {
  content: '';
  position: absolute;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,.15), transparent);
  height: 1px; width: 100%;
}
.pack-deco-lines::before { top: 30%; }
.pack-deco-lines::after  { top: 70%; }

/* ═══════════════════════════════════════════
   BOUTON "OUVRIR LE PACK"
═══════════════════════════════════════════ */
.open-btn {
  position: relative;
  padding: .9rem 3rem;
  background: linear-gradient(135deg, #c9922a 0%, #f5d76e 40%, #d4af37 60%, #a08020 100%);
  background-size: 200% 200%;
  border: none; border-radius: 50px;
  font-family: 'Oswald', sans-serif;
  font-size: clamp(.85rem, 2.5vw, 1rem);
  font-weight: 700; letter-spacing: .2em;
  text-transform: uppercase; color: #000;
  cursor: none; overflow: hidden;
  animation: btnGradShift 3s ease infinite;
  box-shadow: 0 0 30px rgba(212,175,55,.4), 0 4px 20px rgba(0,0,0,.5);
  transition: box-shadow .3s, transform .1s;
}
@keyframes btnGradShift {
  0%,100% { background-position: 0% 50%; }
  50%     { background-position: 100% 50%; }
}
.open-btn::before {
  content: '';
  position: absolute; top: -50%; left: -60%;
  width: 40%; height: 200%;
  background: rgba(255,255,255,.35);
  transform: skewX(-20deg);
  animation: btnShine 3s ease-in-out infinite;
}
@keyframes btnShine {
  0%,100% { left: -60%; }
  50%     { left: 120%; }
}
.open-btn:hover {
  box-shadow: 0 0 50px rgba(212,175,55,.65), 0 4px 20px rgba(0,0,0,.5);
  transform: translateY(-2px);
}

.sound-toggle {
  position: fixed; top: 20px; right: 20px;
  background: rgba(212,175,55,.1);
  border: 1px solid rgba(212,175,55,.35);
  border-radius: 50px;
  padding: .45rem 1.1rem;
  font-family: 'Montserrat', sans-serif;
  font-size: .68rem; font-weight: 600;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--gold); cursor: none; z-index: 999;
  transition: background .3s, box-shadow .3s;
}
.sound-toggle:hover {
  background: rgba(212,175,55,.2);
  box-shadow: 0 0 20px rgba(212,175,55,.25);
}

/* ═══════════════════════════════════════════
   PHASE 3 – LA CARTE FC 24
═══════════════════════════════════════════ */
#phase-card {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 2rem;
  z-index: 15; pointer-events: none; opacity: 0;
}

.card-wrapper {
  position: relative;
  perspective: 1200px;
}

.fc-card {
  width: clamp(220px, 38vw, 290px);
  height: clamp(320px, 55vw, 420px);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 0 1.5px rgba(212,175,55,.6),
    0 0 40px rgba(212,175,55,.5),
    0 0 100px rgba(212,175,55,.25),
    0 0 200px rgba(212,175,55,.1),
    0 25px 60px rgba(0,0,0,.8);
  transform-style: preserve-3d;
  animation: cardTilt 6s ease-in-out infinite;
}
@keyframes cardTilt {
  0%,100% { transform: rotateY(-4deg) rotateX(2deg); }
  50%     { transform: rotateY(4deg)  rotateX(-2deg); }
}

/* Fond de la carte */
.card-bg-layer {
  position: absolute; inset: 0;
  background: var(--card-bg);
}
/* Effet hexagonal FC24 */
.card-hex-pattern {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(ellipse 60% 40% at 50% 30%, rgba(212,175,55,.08) 0%, transparent 70%),
    url("data:image/svg+xml,%3Csvg width='28' height='24' viewBox='0 0 28 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M14 0l14 8v8l-14 8L0 16V8z' fill='none' stroke='rgba(212,175,55,0.06)' stroke-width='0.5'/%3E%3C/svg%3E");
  background-size: cover, 28px 24px;
}

/* Barre de statut supérieure */
.card-top {
  position: absolute;
  top: 16px; left: 16px; right: 16px;
  display: flex; justify-content: space-between; align-items: flex-start;
  z-index: 2;
}
.card-rating-block {
  display: flex; flex-direction: column; align-items: center;
  line-height: 1;
}
.card-rating {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(2.2rem, 8vw, 3rem);
  font-weight: 700; color: var(--gold-light);
  text-shadow: 0 0 20px rgba(245,215,110,.6);
  line-height: 1;
}
.card-position {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(.7rem, 2.5vw, .9rem);
  font-weight: 600; color: var(--gold-light);
  letter-spacing: .05em;
}

.card-meta-right {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.card-flag {
  font-size: clamp(1.2rem, 4vw, 1.6rem);
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
}
.card-club-icon {
  width: clamp(24px, 6vw, 32px); height: clamp(24px, 6vw, 32px);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(1.1rem, 3.5vw, 1.4rem);
}

/* Silhouette joueur */
.card-player-area {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 80%; display: flex; justify-content: center;
  margin-top: 20px; z-index: 1;
}
.player-silhouette {
  width: 100%; max-width: 180px;
  filter: drop-shadow(0 -5px 30px rgba(212,175,55,.3));
  opacity: .75;
}

/* Éclat de lumière sur la carte */
.card-glow-orb {
  position: absolute; top: 15%; left: 50%;
  width: 60%; padding-bottom: 60%;
  transform: translateX(-50%);
  background: radial-gradient(ellipse, rgba(212,175,55,.15) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
  animation: glowPulse 2.5s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { opacity: .6; transform: translateX(-50%) scale(1); }
  50%     { opacity: 1;   transform: translateX(-50%) scale(1.2); }
}

/* Shimmer holographique sur la carte */
.card-hologram {
  position: absolute; inset: -100%;
  width: 300%; height: 300%;
  background: linear-gradient(
    115deg,
    transparent 30%,
    rgba(255,255,255,.04) 40%,
    rgba(212,175,55,.08) 50%,
    rgba(255,255,255,.04) 60%,
    transparent 70%
  );
  animation: cardHolo 4s ease-in-out infinite;
  pointer-events: none; z-index: 3;
}
@keyframes cardHolo {
  0%   { transform: translateX(-40%) rotate(25deg); }
  100% { transform: translateX(40%) rotate(25deg); }
}

/* Nom du joueur */
.card-name-area {
  position: absolute;
  bottom: 60px; left: 0; right: 0;
  text-align: center; z-index: 4; padding: 6px 0;
  background: linear-gradient(transparent, rgba(0,0,0,.3), transparent);
}
.card-name {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1.8rem, 6.5vw, 2.6rem);
  font-weight: 700; letter-spacing: .25em;
  background: var(--card-gold);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  text-shadow: none;
  filter: drop-shadow(0 2px 8px rgba(212,175,55,.6));
}

/* Séparateur */
.card-divider {
  position: absolute; bottom: 56px; left: 12px; right: 12px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,.5), transparent);
  z-index: 4;
}

/* Stats FC24 */
.card-stats {
  position: absolute;
  bottom: 10px; left: 0; right: 0;
  display: flex; justify-content: space-around;
  padding: 0 10px; z-index: 4;
}
.stat-item {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.stat-val {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(.75rem, 2.5vw, .95rem);
  font-weight: 700; color: var(--gold-light);
  line-height: 1;
}
.stat-key {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(.38rem, 1.2vw, .48rem);
  font-weight: 600; letter-spacing: .06em;
  color: rgba(212,175,55,.65);
  text-transform: uppercase;
}

/* Corner trim */
.card-corner { position: absolute; width: 22px; height: 22px; z-index: 5; }
.card-corner::before, .card-corner::after { content: ''; position: absolute; background: var(--gold); }
.card-corner.tl { top: 8px; left: 8px; }
.card-corner.tr { top: 8px; right: 8px; transform: scaleX(-1); }
.card-corner.bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
.card-corner.br { bottom: 8px; right: 8px; transform: scale(-1); }
.card-corner::before { top: 0; left: 0; width: 100%; height: 1.5px; }
.card-corner::after  { top: 0; left: 0; width: 1.5px; height: 100%; }

/* Texte anniversaire sous la carte */
.card-bday-text {
  text-align: center;
  animation: fadeUp 1s ease both;
}
.card-bday-title {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1rem, 3.5vw, 1.6rem);
  font-weight: 700; letter-spacing: .25em;
  text-transform: uppercase;
  background: var(--card-gold);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.card-bday-sub {
  font-size: clamp(.65rem, 2vw, .8rem);
  font-weight: 500; letter-spacing: .35em;
  color: rgba(255,255,255,.35); text-transform: uppercase;
  margin-top: 4px;
}

/* ═══════════════════════════════════════════
   ANIMATIONS UTILITAIRES
═══════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-height: 600px) {
  .open-btn { padding: .65rem 2rem; font-size: .75rem; }
  .card-bday-text { display: none; }
}
@media (max-width: 400px) {
  .card-stats { padding: 0 4px; gap: 0; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     CURSEUR CUSTOM
═══════════════════════════════════════════ -->
<div id="cursor"></div>
<div id="cursor-trail"></div>

<!-- ═══════════════════════════════════════════
     BOUTON SON
═══════════════════════════════════════════ -->
<button class="sound-toggle" id="soundBtn" onclick="toggleSound()">
  🔇 Activer le son
</button>

<!-- ═══════════════════════════════════════════
     CANVAS FX (faisceaux de lumière)
═══════════════════════════════════════════ -->
<canvas id="canvas-fx"></canvas>

<!-- ═══════════════════════════════════════════
     PHASE 4 – MUR DE VIDÉOS
═══════════════════════════════════════════ -->
<div id="video-wall">
  <!-- Les iframes sont injectées dynamiquement par JS -->
</div>
<div id="video-overlay"></div>

<!-- ═══════════════════════════════════════════
     PARTICULES DE FOND
═══════════════════════════════════════════ -->
<div id="bg-particles"></div>

<!-- ═══════════════════════════════════════════
     SCÈNE PRINCIPALE
═══════════════════════════════════════════ -->
<div id="scene">

  <!-- ── PHASE 1 : LE PACK ── -->
  <div id="phase-pack">
    <div class="pack-wrapper" id="pack-wrapper">
      <div class="pack" id="the-pack">
        <div class="pack-bg"></div>
        <div class="pack-hex-pattern" style="position:absolute;inset:0;background-image:url('data:image/svg+xml,%3Csvg width%3D%2228%22 height%3D%2224%22 viewBox%3D%220 0 28 24%22 xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath d%3D%22M14 0l14 8v8l-14 8L0 16V8z%22 fill%3D%22none%22 stroke%3D%22rgba(212%2C175%2C55%2C0.07)%22 stroke-width%3D%220.5%22/%3E%3C/svg%3E');background-size:28px 24px;"></div>
        <div class="pack-sheen"></div>
        <div class="pack-deco-lines"></div>

        <div class="pack-content">
          <div class="pack-logo-area">
            <span class="pack-ea-badge">EA SPORTS FC 24</span>
            <div class="pack-title">ULTIMATE<br>TEAM</div>
            <div class="pack-subtitle">Special Edition Pack</div>
          </div>

          <div class="pack-center-art">
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
              <!-- Shield SVG -->
              <svg class="pack-shield" viewBox="0 0 80 90" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%"   stop-color="#f5d76e"/>
                    <stop offset="40%"  stop-color="#d4af37"/>
                    <stop offset="100%" stop-color="#8a6010"/>
                  </linearGradient>
                </defs>
                <path d="M40 2 L75 16 L75 48 Q75 72 40 88 Q5 72 5 48 L5 16 Z"
                      fill="url(#sg)" stroke="rgba(255,220,80,.4)" stroke-width="1.5"/>
                <path d="M40 14 L65 24 L65 46 Q65 64 40 76 Q15 64 15 46 L15 24 Z"
                      fill="none" stroke="rgba(0,0,0,.25)" stroke-width="1"/>
                <text x="40" y="50" text-anchor="middle" dominant-baseline="middle"
                      font-family="Oswald" font-size="18" font-weight="700"
                      fill="#0a0510" letter-spacing="1">FC24</text>
              </svg>
              <div class="pack-stars">
                <span class="pack-star">★</span>
                <span class="pack-star">★</span>
                <span class="pack-star">★</span>
                <span class="pack-star">★</span>
                <span class="pack-star">★</span>
              </div>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <div class="pack-special-tag">BIRTHDAY EDITION</div>
            <div style="font-size:.45rem;letter-spacing:.3em;color:rgba(255,255,255,.2);text-transform:uppercase;">
              CONTAIN 1 SPECIAL ITEM
            </div>
          </div>
        </div>

        <!-- Bordure intérieure -->
        <div style="position:absolute;inset:4px;border-radius:14px;border:1px solid rgba(212,175,55,.2);pointer-events:none;"></div>
      </div>

      <!-- Halo sous le pack -->
      <div style="position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:120%;height:40px;background:radial-gradient(ellipse,rgba(212,175,55,.3),transparent 70%);filter:blur(8px);pointer-events:none;"></div>
    </div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ██████╗ ██████╗ ███╗   ██╗███████╗██╗ ██████╗
   ██╔════╝██╔═══██╗████╗  ██║██╔════╝██║██╔════╝
   ██║     ██║   ██║██╔██╗ ██║█████╗  ██║██║  ███╗
   ██║     ██║   ██║██║╚██╗██║██╔══╝  ██║██║   ██║
   ╚██████╗╚██████╔╝██║ ╚████║██║     ██║╚██████╔╝
    ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝╚═╝     ╚═╝ ╚═════╝
   ═══════════════════════════════════════════════════════════════

   ╔══════════════════════════════════════════════╗
   ║   🎮 SECTION PERSONNALISATION – MODIFIER ICI  ║
   ╚══════════════════════════════════════════════╝
*/

// ────────────────────────────────────────────────
// 🃏 DONNÉES DE LA CARTE ALI (tout modifier ici)
// ────────────────────────────────────────────────
const CARD_DATA = {
  rating:      24,          // Note globale
  name:        "ALI",       // Nom du joueur
  position:    "HB",        // Poste (HB = Happy Birthday)
  flag:        "🇲🇦",      // Drapeau pays (emoji)
  club:        "🎂",        // Icône club (emoji ou image)
  stats: {
    PAC: 99,   // Pace / Vitesse
    SHO: 99,   // Shooting / Tir
    PAS: 99,   // Passing / Passe
    DRI: 99,   // Dribbling
    DEF: 99,   // Defending / Défense
    PHY: 99,   // Physical / Physique
  }
};

// ────────────────────────────────────────────────
// 📺 IDs YOUTUBE À REMPLACER (juste l'ID, pas l'URL)
// Pour trouver l'ID : youtube.com/watch?v=CECI_EST_L_ID
// ────────────────────────────────────────────────
const YOUTUBE_IDS = {
  video1: "K2csY1cMpfA",   // Ziyech
  video2: "-7Tg4zg7mvI",
  video3: "nA8wHQvHPJU",
  video4: "RK3LLoH_B-s",
};

/* ═══════════════════════════════════════════════
   FIN DE LA SECTION PERSONNALISATION
   (ne pas modifier ce qui suit)
═══════════════════════════════════════════════ */

// ── État ──
let soundEnabled = false;
let audioCtx = null;
let packOpened = false;

// ── Init carte ──
(function initCard() {
  document.getElementById('c-rating').textContent   = CARD_DATA.rating;
  document.getElementById('c-position').textContent = CARD_DATA.position;
  document.getElementById('c-name').textContent     = CARD_DATA.name;

  document.getElementById('c-club').textContent     = CARD_DATA.club;

  const statsEl = document.getElementById('c-stats');
  Object.entries(CARD_DATA.stats).forEach(([key, val]) => {
    statsEl.innerHTML += `
      <div class="stat-item">
        <span class="stat-val">${val}</span>

})();

// ── Particules de fond ──
(function createBgParticles() {
  const container = document.getElementById('bg-particles');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'bg-star';

    container.appendChild(s);

})();

// ── Curseur custom ──
const cursor = document.getElementById('cursor');
const trail  = document.getElementById('cursor-trail');
let mx=0, my=0, tx=0, ty=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
(function animCursor() {
  tx += (mx-tx)*.14; ty += (my-ty)*.14;
  gsap.set(cursor, {x:mx, y:my});
  gsap.set(trail,  {x:tx, y:ty});
  requestAnimationFrame(animCursor);
})();

// ── Audio (synthétisé) ──
function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent =
    soundEnabled ? '🔊 Son activé' : '🔇 Activer le son';
}

function playWalkoutSound() {
  if (!soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx = audioCtx;

    // Bruit de stade (white noise filtré)
    const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random()*2-1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type='bandpass'; filter.frequency.value=600; filter.Q.value=.5;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(.4, ctx.currentTime+.3);
    gain.gain.linearRampToValueAtTime(.15, ctx.currentTime+2);
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime+2);

    // Fanfare EA Sports (arpège)
    const notes = [523,659,784,1047,1319,1568];
    notes.forEach((freq,i) => {
      const osc  = ctx.createOscillator();
      const gn   = ctx.createGain();
      const t    = ctx.currentTime + .6 + i*.12;
      osc.type   = i<3?'sine':'triangle';
      osc.frequency.value = freq;
      gn.gain.setValueAtTime(0, t);
      gn.gain.linearRampToValueAtTime(.35, t+.05);
      gn.gain.exponentialRampToValueAtTime(.001, t+.5);
      osc.connect(gn); gn.connect(ctx.destination);
      osc.start(t); osc.stop(t+.5);
    });
  } catch(e) { console.warn('Audio non supporté', e); }
}

// ── Canvas FX (faisceaux de lumière Walkout) ──
const canvasFx = document.getElementById('canvas-fx');
const ctxFx    = canvasFx.getContext('2d');
let beamAnim   = null;
let beamProgress = 0;

function resizeCanvas() {
  canvasFx.width  = window.innerWidth;
  canvasFx.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawBeams(progress) {
  const w = canvasFx.width, h = canvasFx.height;
  const cx = w/2, cy = h/2;
  ctxFx.clearRect(0,0,w,h);

  const numBeams = 20;
  for (let i=0; i<numBeams; i++) {
    const angle  = (i/numBeams)*Math.PI*2 + performance.now()*.0003;
    const length = Math.min(w,h) * 0.9 * progress;
    const width  = (3 + Math.sin(i*1.7)*2) * progress;
    const alpha  = (.6 + Math.sin(i*2.3+performance.now()*.002)*.3) * progress;

    const grad = ctxFx.createLinearGradient(cx, cy,
      cx + Math.cos(angle)*length, cy + Math.sin(angle)*length);

    const isGold = i%3 !== 2;
    if (isGold) {
      grad.addColorStop(0,   `rgba(212,175,55,${alpha})`);
      grad.addColorStop(.4,  `rgba(245,215,110,${alpha*.7})`);
      grad.addColorStop(1,   `rgba(212,175,55,0)`);
    } else {
      grad.addColorStop(0,   `rgba(255,255,255,${alpha*.6})`);
      grad.addColorStop(.5,  `rgba(255,240,180,${alpha*.4})`);
      grad.addColorStop(1,   `rgba(255,255,255,0)`);
    }

    ctxFx.save();
    ctxFx.beginPath();
    ctxFx.moveTo(cx, cy);
    ctxFx.lineTo(cx + Math.cos(angle)*length, cy + Math.sin(angle)*length);
    ctxFx.strokeStyle = grad;
    ctxFx.lineWidth   = width;
    ctxFx.lineCap     = 'round';
    ctxFx.stroke();
    ctxFx.restore();
  }

  // Halo central
  const halo = ctxFx.createRadialGradient(cx,cy,0, cx,cy,200*progress);
  halo.addColorStop(0,   `rgba(212,175,55,${.8*progress})`);
  halo.addColorStop(.3,  `rgba(245,215,110,${.4*progress})`);
  halo.addColorStop(1,   `rgba(212,175,55,0)`);
  ctxFx.beginPath();
  ctxFx.arc(cx,cy,200*progress,0,Math.PI*2);
  ctxFx.fillStyle = halo;
  ctxFx.fill();
}

function startBeamAnimation(onDone) {
  gsap.to(canvasFx, { opacity:1, duration:.3 });
  let start = null;
  const duration = 2200;

  function loop(ts) {
    if (!start) start=ts;
    const elapsed = ts-start;
    beamProgress = Math.min(elapsed/duration, 1);

    // Ease in-out
    const eased = beamProgress < .5
      ? 2*beamProgress*beamProgress
      : 1-Math.pow(-2*beamProgress+2,2)/2;

    drawBeams(eased);
    if (elapsed < duration) {
      beamAnim = requestAnimationFrame(loop);
    } else {
      gsap.to(canvasFx, { opacity:0, duration:.8, onComplete: () => {
        ctxFx.clearRect(0,0,canvasFx.width,canvasFx.height);
        onDone && onDone();
      }});
    }
  }
  beamAnim = requestAnimationFrame(loop);
}

// ── Confettis ──
function fireConfetti() {
  const gold  = ['#D4AF37','#F5D76E','#A08020','#FFD700'];
  const mixed = [...gold,'#FFFFFF','#FF6B9D','#60A5FA'];

  // Vague 1 – éclat central
  confetti({ particleCount:150, spread:100, origin:{x:.5,y:.45},
    colors:mixed, startVelocity:55, ticks:200 });

  // Vague 2 – latéraux
  setTimeout(()=>{
    confetti({ particleCount:80, angle:60,  spread:70, origin:{x:.1,y:.5}, colors:gold });
    confetti({ particleCount:80, angle:120, spread:70, origin:{x:.9,y:.5}, colors:gold });
  }, 300);

  // Vague 3 – cascade or
  setTimeout(()=>{
    confetti({ particleCount:60, spread:120, origin:{x:.5,y:.2},
      colors:gold, gravity:1.2, startVelocity:30 });
  }, 600);

  // Emojis
  const shapes = ['🎉','⭐','🏆','⚽','🎂'].map(e =>
    confetti.shapeFromText({ text:e, scalar:2 }));
  shapes.forEach((shape,i)=>{
    setTimeout(()=>{
      confetti({ shapes:[shape], scalar:2, particleCount:8,
        spread:60, origin:{x:.15+i*.18, y:.4}, ticks:130 });
    }, i*150);
  });
}

// ── SÉQUENCE D'OUVERTURE ──
function openPack() {
  if (packOpened) return;
  packOpened = true;

  const pack    = document.getElementById('the-pack');
  const wrapper = document.getElementById('pack-wrapper');
  const packPhase = document.getElementById('phase-pack');

  // Son
  playWalkoutSound();

  // 1. Tremblement du pack
  gsap.to(pack, {
    keyframes: [
      { x:-8, y:-3,  rotation:-3,  duration:.07 },
      { x: 8, y: 3,  rotation: 3,  duration:.07 },
      { x:-10,y:-4,  rotation:-4,  duration:.07 },
      { x: 10,y: 4,  rotation: 4,  duration:.07 },
      { x:-6, y:-2,  rotation:-2,  duration:.07 },
      { x: 6, y: 2,  rotation: 2,  duration:.07 },
      { x: 0, y: 0,  rotation: 0,  duration:.07 },
    ],
    ease: 'none',
    onComplete: () => {

      // 2. Explosion du pack (scale up + fade)
      gsap.to(pack, { scale:1.2, opacity:0, duration:.4, ease:'power2.in' });
      gsap.to(wrapper, { scale:.8, opacity:0, duration:.5, ease:'power2.in',
        onComplete: () => { packPhase.style.display='none'; }
      });

      // 3. Faisceaux de lumière
      startBeamAnimation(() => {
        // 5. Révélation de la carte
        revealCard();
      });

      // 4. Confettis (pendant les faisceaux)
      setTimeout(fireConfetti, 400);
    }
  });
}

// ── Révélation de la carte ──
function revealCard() {
  const cardPhase = document.getElementById('phase-card');
  const card      = document.getElementById('fc-card');
  const bdayText  = document.getElementById('bday-text');

  // Afficher la phase carte
  cardPhase.style.opacity = '1';
  cardPhase.style.pointerEvents = 'all';

  // Carte entre avec flip
  gsap.fromTo(card,
    { rotateY:90, scale:.6, opacity:0 },
    { rotateY:0,  scale:1,  opacity:1, duration:1,
      ease:'back.out(1.4)', delay:.1,
      onComplete: () => {
        // Texte anniversaire
        gsap.fromTo(bdayText,
          { y:20, opacity:0 },
          { y:0,  opacity:1, duration:.7, ease:'power2.out' }
        );
        // Mur de vidéos
        setTimeout(showVideoWall, 800);
        // Confettis bonus
        setTimeout(fireConfetti, 1200);
      }
    }
  );
}

// ── Mur de vidéos ──
function showVideoWall() {
  const overlay = document.getElementById('video-overlay');
  gsap.to(overlay, { opacity:1, duration:1.2 });

  // Afficher le bouton "Lancer les vidéos"
  const playBtn = document.getElementById('video-play-btn');
  gsap.fromTo(playBtn,
    { opacity:0, y:20, pointerEvents:'none' },
    { opacity:1, y:0,  pointerEvents:'all', duration:.8, delay:.5 }
  );
}

function launchVideos() {
  const wall    = document.getElementById('video-wall');
  const playBtn = document.getElementById('video-play-btn');
  const ids     = Object.values(YOUTUBE_IDS);

  gsap.to(playBtn, { opacity:0, scale:.8, duration:.3,
    onComplete: () => { playBtn.style.display='none'; }
  });

  wall.innerHTML = '';

  ids.forEach((id, i) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;width:100%;height:100%;overflow:hidden;background:#000;';

    // iframe directe – marche en file:// ET en https://
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&controls=0&modestbranding=1&rel=0&iv_load_policy=3&disablekb=1&fs=0&playsinline=1&enablejsapi=0`;
    iframe.allow = 'autoplay; encrypted-media';
    iframe.setAttribute('allowfullscreen', '');
    // Scale 120% pour masquer les barres YouTube
    iframe.style.cssText = 'position:absolute;top:-10%;left:-10%;width:120%;height:120%;border:none;pointer-events:none;';

    // ── Fallback visuel si YouTube est bloqué ──
    const fallback = document.createElement('div');
    fallback.style.cssText = `
      position:absolute;inset:0;
      background: radial-gradient(ellipse at 50% 50%,
        hsl(${220 + i*40},60%,12%) 0%,
        hsl(${200 + i*40},50%,6%) 100%);
      display:flex;align-items:center;justify-content:center;
      font-size:3rem;opacity:.6;
    `;
    fallback.innerHTML = ['⚽','🏆','🎉','⭐'][i % 4];

    // Anime le fallback en fond pulsant
    const animEl = document.createElement('div');
    animEl.style.cssText = `
      position:absolute;inset:0;
      background: radial-gradient(ellipse at 50% 50%,
        rgba(212,175,55,.15) 0%, transparent 70%);
      animation: glowPulse ${2.5 + i * 0.4}s ease-in-out infinite;
    `;

    fallback.appendChild(animEl);
    wrap.appendChild(fallback);
    wrap.appendChild(iframe);
    wall.appendChild(wrap);

    // Détection du chargement : si l'iframe charge, on cache le fallback
    iframe.addEventListener('load', () => {
      gsap.to(fallback, { opacity:0, duration:.8, delay:.5 });
    });
  });

  gsap.to(wall, { opacity:1, duration:1.2 });
}

// ── Interactivité carte (parallax au survol) ──
const fcCard = document.getElementById('fc-card');
fcCard.addEventListener('mousemove', e => {
  const rect = fcCard.getBoundingClientRect();
  const cx   = rect.left + rect.width/2;
  const cy   = rect.top  + rect.height/2;
  const rx   = (e.clientY-cy)/rect.height * 12;
  const ry   = (e.clientX-cx)/rect.width  * -12;
  gsap.to(fcCard, { rotateX:rx, rotateY:ry, duration:.4, ease:'power2.out',
    overwrite:'auto' });
});
fcCard.addEventListener('mouseleave', () => {
  gsap.to(fcCard, { rotateX:0, rotateY:0, duration:.8, ease:'elastic.out(1,.5)' });
});
</script>
